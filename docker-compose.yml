services:
  postgres:
    image: postgres:16-alpine
    container_name: glrecon_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-glrecon}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-glrecon}
      POSTGRES_DB: ${POSTGRES_DB:-glrecon}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-glrecon} -d ${POSTGRES_DB:-glrecon}"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  pgdata:
